name: Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2.0.18
        with:
          command: check advisories bans licenses sources

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      # Ignored advisories are tracked in deny.toml [advisories.ignore].
      # RUSTSEC-2025-0119 — number_prefix unmaintained (transitive via indicatif <= 0.17).
      # RUSTSEC-2025-0140 — gix-date <= 0.9.x unmaintained (transitive via gix 0.71).
      # RUSTSEC-2024-0436 — paste unmaintained (transitive via rmcp 0.1.x).
      - run: cargo audit --deny warnings --ignore RUSTSEC-2025-0119 --ignore RUSTSEC-2025-0140 --ignore RUSTSEC-2024-0436
