name: Release

# Tag-driven release pipeline powered by `cargo-dist` (the `dist` CLI).
# Triggered by pushing a SemVer-style tag, e.g. `v0.1.0`, `v1.2.3-rc.1`.
#
# Pipeline:
#   plan    -> resolves the dist manifest for the tag.
#   build   -> matrix build of release artifacts on each target host.
#   release -> aggregates artifacts + SHA256 checksums into a GitHub Release.

on:
  push:
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pin the dist CLI to a known-good version. Bump intentionally.
  DIST_VERSION: 0.28.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dist
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "https://github.com/axodotdev/cargo-dist/releases/download/v${DIST_VERSION}/cargo-dist-installer.sh" | sh
      - name: dist plan
        run: dist plan --tag="${GITHUB_REF_NAME}" --output-format=json > dist-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: dist-manifest
          path: dist-manifest.json

  build:
    name: Build (${{ matrix.target }})
    needs: plan
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: dist-${{ matrix.target }}

      # musl static linking needs the musl C toolchain on Linux.
      - name: Install musl tooling
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install dist (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "https://github.com/axodotdev/cargo-dist/releases/download/v${DIST_VERSION}/cargo-dist-installer.sh" | sh
      - name: Install dist (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          irm "https://github.com/axodotdev/cargo-dist/releases/download/v$env:DIST_VERSION/cargo-dist-installer.ps1" | iex

      - name: Build artifacts
        if: runner.os != 'Windows'
        shell: bash
        run: dist build --tag="${GITHUB_REF_NAME}" --target=${{ matrix.target }} --artifacts=local

      - name: Build artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export LIBZ_SYS_DISABLE_NATIVE=1
          dist build --tag="${GITHUB_REF_NAME}" --target=${{ matrix.target }} --artifacts=local

      - name: Generate SHA256 checksums
        shell: bash
        working-directory: target/distrib
        run: |
          shopt -s nullglob
          for f in *.tar.gz *.tar.xz *.tar.zst *.zip *.exe *.msi *.deb *.rpm; do
            [ -f "$f" ] || continue
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            target/distrib/*.tar.gz
            target/distrib/*.tar.xz
            target/distrib/*.tar.zst
            target/distrib/*.zip
            target/distrib/*.sha256
          if-no-files-found: error

  build-global:
    name: Build global installers
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: dist-global
      - name: Install dist
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "https://github.com/axodotdev/cargo-dist/releases/download/v${DIST_VERSION}/cargo-dist-installer.sh" | sh

      # `dist build --artifacts=global` emits the cargo-dist universal installer
      # scripts (rfo-installer.sh / rfo-installer.ps1) plus an updated
      # dist-manifest.json. The installers reference release-asset URLs derived
      # from the tag, so they don't need the matrix archives to be physically
      # present here.
      - name: Build global artifacts (installers + manifest)
        run: dist build --tag="${GITHUB_REF_NAME}" --artifacts=global

      - name: Generate SHA256 for installers
        shell: bash
        working-directory: target/distrib
        run: |
          shopt -s nullglob
          for f in *-installer.sh *-installer.ps1; do
            [ -f "$f" ] || continue
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done
          echo "--- target/distrib ---"
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: dist-global
          path: |
            target/distrib/*-installer.sh
            target/distrib/*-installer.ps1
            target/distrib/*.sha256
            target/distrib/dist-manifest.json
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: [plan, build, build-global]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      # Download each artifact individually to avoid pattern matching issues
      - uses: actions/download-artifact@v4
        with:
          name: dist-x86_64-unknown-linux-musl
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: dist-aarch64-unknown-linux-musl
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: dist-x86_64-apple-darwin
          path: artifacts/macos
      - uses: actions/download-artifact@v4
        with:
          name: dist-aarch64-apple-darwin
          path: artifacts/macos
      - uses: actions/download-artifact@v4
        with:
          name: dist-x86_64-pc-windows-msvc
          path: artifacts/windows
      - uses: actions/download-artifact@v4
        with:
          name: dist-global
          path: artifacts
      - name: List artifacts
        run: |
          echo "=== artifacts listing ==="
          find artifacts -type f | sort
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag \
            artifacts/*
