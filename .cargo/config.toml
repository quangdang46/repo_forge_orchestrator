# Cargo build configuration for repo_forge.
#
# Notes:
# - Keep this file minimal; per-crate flags live in each crate's Cargo.toml.
# - We do NOT set `[net] offline = true` here so CI / contributors can fetch
#   crates normally. Local hermetic builds should set CARGO_NET_OFFLINE=1.
# - `xtask` is the canonical entrypoint for project-level scripts.

[alias]
xtask = "run --package xtask --"

# Default registry settings — keep stock so `cargo publish` would work later.
[registries.crates-io]
protocol = "sparse"

# Faster incremental dev builds; release profile lives in Cargo.toml.
[build]
# rustflags here would apply to every crate, every build. Leave empty by
# default — opt-in via per-target sections below if needed.

[term]
verbose = false
color = "auto"

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

# Required for cargo-dist Windows MSVC builds to resolve UCRT symbols
# used by libz-ng-sys (via reqwest dependency).
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
