# Pinned toolchain for repo_forge.
#
# Edition: Rust 2024 (stabilized in 1.85).
# We track the latest stable channel for CI; MSRV is 1.85 (enforced via
# `package.rust-version` in Cargo.toml).
# Pin to a specific channel locally if reproducibility matters; CI uses
# `dtolnay/rust-toolchain@stable` everywhere for consistency.
[toolchain]
channel = "stable"
components = ["rustfmt", "clippy"]
profile = "minimal"
